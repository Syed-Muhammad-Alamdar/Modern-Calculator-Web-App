<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up</title>
  <link rel="stylesheet" href="signup.css">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
   <script src="sign.js" defer></script>
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>
  <div id="Main">
  
      <h1 id="log">Sign up</h1>
      <form action="log.html" onsubmit="return clikk()">
        <label for="username" class="label">Username </label> <br>
        <input type="text" id="username" placeholder="Username" required><br><br>

        <label for="password" class="label">Password </label> <br>
        <input type="password" class="username-2" placeholder="Password" required><br><br>

        <label for="email" class="label-2">Email </label> <br>
        <input type="email" class="username-3" placeholder="Email" required><br><br>

        <label for="Phone" class="label-1">Phone number </label> <br>
        <input type="tel" class="username-4" placeholder="Phone number" required><br><br>

        <button id="button" type="submit">Sign up</button>
      </form>
      <br>
      <br>
      <p>Already have an account? <a href="log.html">Login in</a></p>

  </div>

  <script>
  </script>
</body>
</html>
