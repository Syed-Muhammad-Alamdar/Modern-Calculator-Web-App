<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password?</title>
    <link rel="stylesheet" href="forget.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="forget.css">
    <script src="forget.js" defer></script>
</head>
<body>
    <div class="recovery-container">
        <h2>Password Recovery</h2>
        <p class="subtitle">Enter your registered phone number to retrieve your password.</p>
        
        <div class="input-group">
            <input type="tel" id="inp" placeholder="Phone number" autocomplete="off" required>
        </div>
        
        <button onclick="verifyPhone()" class="animated-btn">Recover Password</button> 
        
        <h3 id="password-display"></h3>
        
        <a href="log.html" class="back-link">Back to Login</a>
    </div>
</body>
</html>
